name: Deploy Backend
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: road-bike-backend
  DEPLOY_PATH: /opt/bike_web
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Set build tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          set -e
          echo "Building $IMAGE_NAME:${{ steps.vars.outputs.tag }}"
          docker build -t "$IMAGE_NAME:${{ steps.vars.outputs.tag }}" .
          docker image ls "$IMAGE_NAME"

      - name: Save backend image archive
        run: |
          set -e
          echo "Saving image archive backend-${{ steps.vars.outputs.tag }}.tar.gz"
          docker save "$IMAGE_NAME:${{ steps.vars.outputs.tag }}" | gzip > "backend-${{ steps.vars.outputs.tag }}.tar.gz"
          ls -lh "backend-${{ steps.vars.outputs.tag }}.tar.gz"

      - name: Copy backend image archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "backend-${{ steps.vars.outputs.tag }}.tar.gz"
          target: "/tmp"

      - name: Deploy backend to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "==> Starting backend deployment"
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"
            echo "==> Loading image archive"
            gunzip -c "/tmp/backend-${{ steps.vars.outputs.tag }}.tar.gz" | docker load
            rm -f "/tmp/backend-${{ steps.vars.outputs.tag }}.tar.gz"
            if [ ! -f .env ]; then
              touch .env
            fi
            if grep -q '^BACKEND_TAG=' .env; then
              sed -i 's/^BACKEND_TAG=.*/BACKEND_TAG=${{ steps.vars.outputs.tag }}/' .env
            else
              echo 'BACKEND_TAG=${{ steps.vars.outputs.tag }}' >> .env
            fi
            echo "==> Effective BACKEND_TAG"
            grep '^BACKEND_TAG=' .env || true
            echo "==> Recreating backend container"
            docker compose up -d backend
            echo "==> Waiting for backend health"
            sleep 8
            curl -f http://127.0.0.1:8000/api/health
            echo "==> Backend container status"
            docker compose ps backend
            echo "==> Cleaning old backend images"
            docker image prune -f >/dev/null 2>&1 || true
            docker images "$IMAGE_NAME" --format '{{.Repository}}:{{.Tag}} {{.ID}}' | tail -n +4 | awk '{print $2}' | xargs -r docker rmi -f || true
            echo "==> Backend deployment finished"

      - name: Clean local backend archive
        if: always()
        run: rm -f "backend-${{ steps.vars.outputs.tag }}.tar.gz"
