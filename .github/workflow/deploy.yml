name: Deploy Backend
on:
  push:
    branches:
      - main
env:
  REGISTRY: 43.142.172.104
  IMAGE_NAME: road-bike-backend
  DEPLOY_PATH: /opt/bike-web
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4
      - name: Set build tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build backend image
        run: |
          docker build -t "$REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.tag }}" .
      - name: Push backend image
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.tag }}"
      - name: Deploy backend to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"
            if [ ! -f .env ]; then
              touch .env
            fi
            if grep -q '^BACKEND_TAG=' .env; then
              sed -i 's/^BACKEND_TAG=.*/BACKEND_TAG=${{ steps.vars.outputs.tag }}/' .env
            else
              echo 'BACKEND_TAG=${{ steps.vars.outputs.tag }}' >> .env
            fi
            docker login "${{ env.REGISTRY }}" -u "${{ secrets.REGISTRY_USERNAME }}" -p "${{ secrets.REGISTRY_PASSWORD }}"
            docker compose pull backend
            docker compose up -d backend
            sleep 8
            curl -f http://127.0.0.1:8000/api/health